services:
  proddev-engine:
    build: .
    container_name: proddev-engine
    restart: "no"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./.env:/app/.env:ro
      - ../shared-infra/storage:/app/shared/storage:ro
    environment:
      - TZ=Asia/Shanghai
    working_dir: /app
    command: sh -c "uvicorn src.agents.training_api:app --host 0.0.0.0 --port 8000 & python -m src.main"
    ports:
      - "8000:8000"
    networks:
      - trinity-net

networks:
  trinity-net:
    external: true
